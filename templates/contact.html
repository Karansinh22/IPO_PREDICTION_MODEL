<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | IPO Wealth Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --money-green: #22c55e;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --beige: #f5f5dc;
            --deep-black: #0a0a0a;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--deep-black);
            background-image: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #0a0a0a 100%);
            color: var(--beige);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .top-nav {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 50px;
            background: rgba(13, 17, 23, 0.82);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .nav-brand h1 {
            font-size: 1.2rem;
            margin: 0;
            background: linear-gradient(135deg, #fff 0%, var(--beige) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-link {
            color: var(--beige);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.6;
            transition: 0.3s;
        }

        .nav-link:hover {
            opacity: 1;
            color: var(--money-green);
        }

        .container {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        h2 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        input,
        textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-family: inherit;
            outline: none;
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus {
            border-color: var(--money-green);
        }

        .btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
        }

        .info-item {
            margin-bottom: 30px;
        }

        .info-item h4 {
            margin: 0 0 10px 0;
            color: var(--money-green);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .info-item p {
            margin: 0;
            opacity: 0.8;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <nav class="top-nav">
        <div class="nav-brand">
            <h1>Predictor Terminal</h1>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link">Home</a>
            <a href="/#analysis-engine" class="nav-link">Prediction Engine</a>
            <a href="/about" class="nav-link">About Us</a>
            <a href="/contact" class="nav-link">Contact Us</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Get in Touch</h2>
            <form>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="How can we help?"></textarea>
                </div>
                <button type="button" class="btn">Send Intelligence Inquiry</button>
            </form>
        </div>

        <div class="info-side" style="padding: 20px;">
            <h2>Intelligence HQ</h2>
            <div class="info-item">
                <h4>Support Email</h4>
                <p>intel@ipo-predictor.ai</p>
            </div>
            <div class="info-item">
                <h4>Terminal Operations</h4>
                <p>24/7 Neural Data Sync<br>Real-time Market Feed</p>
            </div>
            <div class="info-item">
                <h4>Location</h4>
                <p>Digital Financial Hub<br>Mumbai, India</p>
            </div>
        </div>
    </div>
</body>

</html>
